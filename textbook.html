<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS English Mastery - Interactive Textbook</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: rgba(30, 41, 59, 0.7);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --accent: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --sidebar-width: 320px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(245, 158, 11, 0.1) 0px, transparent 50%);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* Sidebar Navigation */
    .sidebar {
      width: var(--sidebar-width);
      background: rgba(15, 23, 42, 0.95);
      border-right: 1px solid var(--border);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 10;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      flex-direction: column;
      margin-bottom: 2.5rem;
      border-left: 4px solid var(--accent);
      padding-left: 1rem;
    }

    .brand-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: white;
    }

    .brand-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .nav-item {
      padding: 0.8rem 1rem;
      border-radius: 0.75rem;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--text-muted);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }

    .nav-item.active {
      border-left: 3px solid var(--primary);
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
      font-weight: 600;
    }

    /* Main Content Area */
    .main-content {
      margin-left: var(--sidebar-width);
      flex-grow: 1;
      padding: 3rem;
      max-width: 1100px;
      min-width: 0;
    }

    /* Tabs */
    .content-tabs {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .tab-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      padding: 0.6rem 1.4rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .tab-btn:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.03);
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    /* Card Panels */
    .panel {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Content Styling */
    h1, h2, h3, h4 {
      font-family: 'Outfit', sans-serif;
      color: white;
      margin-bottom: 1.5rem;
    }

    p {
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 1.5rem;
      font-size: 1.05rem;
    }

    ul, ol {
      margin-left: 1.5rem;
      margin-bottom: 1.5rem;
      color: var(--text-muted);
    }

    li {
      margin-bottom: 0.5rem;
      line-height: 1.6;
    }

    .chapter-image {
      width: 100%;
      max-height: 380px;
      object-fit: cover;
      border-radius: 1rem;
      margin-bottom: 2rem;
      border: 1px solid var(--border);
    }

    /* Callouts */
    .callout {
      padding: 1.5rem;
      border-radius: 1rem;
      margin: 2rem 0;
      border-left: 4px solid;
    }

    .callout-title {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .callout-data {
      background: rgba(59, 130, 246, 0.08);
      border-color: #3b82f6;
      color: #93c5fd;
    }

    .callout-speaking {
      background: rgba(245, 158, 11, 0.08);
      border-color: #f59e0b;
      color: #fde047;
    }

    .callout-commentary {
      background: rgba(148, 163, 184, 0.08);
      border-color: #94a3b8;
      color: #cbd5e1;
    }

    /* Tables */
    .table-container {
      overflow-x: auto;
      margin: 2rem 0;
      border: 1px solid var(--border);
      border-radius: 1rem;
      background: rgba(30, 41, 59, 0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: rgba(15, 23, 42, 0.6);
      color: var(--text-muted);
      font-weight: 600;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-main);
    }

    tr:last-child td {
      border-bottom: none;
    }

    pre {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      padding: 1.5rem;
      border-radius: 0.75rem;
      font-family: monospace;
      font-size: 0.95rem;
      color: #e2e8f0;
      overflow-x: auto;
      margin: 2rem 0;
    }

    /* Practice Items */
    .practice-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .practice-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .practice-item:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.04);
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .eng-sentence {
      font-size: 1.15rem;
      font-weight: 600;
      color: white;
    }

    .geo-sentence {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .controls {
      display: flex;
      gap: 0.5rem;
    }

    .btn-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      font-size: 1.1rem;
    }

    .btn-circle:hover {
      background: var(--primary);
      border-color: var(--primary);
      transform: scale(1.05);
    }

    .btn-mic:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn-mic.recording {
      background: var(--danger);
      border-color: var(--danger);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .status-alert {
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      display: none;
      margin-top: 0.5rem;
    }

    .status-success {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* Quiz Styling */
    .quiz-question {
      font-size: 1.25rem;
      font-weight: 600;
      color: white;
      margin-bottom: 1.5rem;
    }

    .quiz-options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    @media(min-width: 600px) {
      .quiz-options {
        grid-template-columns: 1fr 1fr;
      }
    }

    .option-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 1.2rem;
      border-radius: 1rem;
      cursor: pointer;
      text-align: left;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    .option-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateX(3px);
    }

    .option-btn.correct {
      background: rgba(16, 185, 129, 0.15);
      border-color: var(--success);
      color: var(--success);
      font-weight: 600;
    }

    .option-btn.incorrect {
      background: rgba(239, 68, 68, 0.15);
      border-color: var(--danger);
      color: var(--danger);
    }

    .btn-next {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.8rem 1.8rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      display: none;
      align-self: flex-end;
    }

    .btn-next:hover {
      background: var(--primary-hover);
    }

    /* PRINT LAYOUT */
    @media print {
      body {
        background: white;
        color: black;
        display: block;
      }
      .sidebar, .content-tabs, .controls, .btn-next, .quiz-options, .quiz-question, .scoreboard {
        display: none !important;
      }
      .main-content {
        margin-left: 0 !important;
        padding: 0 !important;
      }
      .panel {
        display: block !important;
      }
      .panel:not(#read-panel) {
        display: none !important;
      }
      h1, h2, h3, h4 {
        color: black !important;
      }
      p, li, td {
        color: #2D3748 !important;
      }
      .callout {
        border-color: #4A5568 !important;
        background: #F7FAFC !important;
        color: black !important;
      }
    }
  </style>
</head>

    // Chapter Data with text, speaking sentences, and quizzes

          <h2>Prelude</h2>

          <div class="callout callout-data">

          <div class="callout callout-commentary">

          { eng: "Empathy is the most effective driver of customer satisfaction.", geo: "ემპათია არის მომხმარებლის კმაყოფილების ყველაზე ეფექტური მამოძრავებელი ძალა." }

      ch2: {
        title: "Chapter 2: Scaffolding Your Grammar (A2 to B1) & Adjectives",
        readHtml: `
          <h2>Scaffolding Your Grammar (A2 to B1) & Adjectives</h2>
          <img class="chapter-image" src="images/ch2.png" alt="Chapter 2 Illustration">
          <p>In customer support, basic grammar scaffolding means being able to state facts, ask clear questions, give instructions, and compare items clearly.</p>

          <div class="callout callout-data">
            <div class="callout-title">Comparative & Superlative - ზედსართავი სახელების შედარებითი და აღმატებითი ხარისხები</div>
            <p><strong>Comparative (შედარებითი ხარისხი)</strong> გამოიყენება მაშინ როდესაც ვადარებთ ორ ადამიანს ან საგანს (taller, more beautiful). ხშირად გვჭირდება სიტყვა <strong>than</strong> (ვიდრე).</p>
            <p><strong>Superlative (აღმატებითი ხარისხი)</strong> გამოიყენება მაშინ როდესაც ვადარებთ სამ ან მეტ ადამიანს ან საგანს (the tallest, the most beautiful). არ დაგავიწყდეთ არტიკლი <strong>the</strong>.</p>

                  <th>მაგალითები</th>

    let activeChapter = 'prelude';
    let activeTab = 'read';
    let currentQuizIdx = 0;
    let quizScore = 0;

    // Switch Chapter
    function selectChapter(chapterId) {
      activeChapter = chapterId;
      currentQuizIdx = 0;
      quizScore = 0;
      
      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
      const activeItem = Array.from(document.querySelectorAll('.nav-item')).find(item => 
        item.getAttribute('onclick').includes(`'${chapterId}'`)
      );
      if (activeItem) activeItem.classList.add('active');

      renderContent();
    }

    // Switch Tab
    function switchTab(tabId) {
      activeTab = tabId;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => 
        btn.getAttribute('onclick').includes(`'${tabId}'`)
      );
      if (activeBtn) activeBtn.classList.add('active');

      renderContent();
    }

    // Render current view
    function renderContent() {
      const data = textbookData[activeChapter];
      const contentArea = document.getElementById('content-area');
      
      if (activeTab === 'read') {
        contentArea.innerHTML = `<div class="panel active">${data.readHtml}</div>`;
      } 
      else if (activeTab === 'practice') {
        let practiceHtml = `
          <div class="panel active">
            <h2>🗣️ გამოთქმა და მოსმენა</h2>
            <p style="margin-bottom: 2rem;">მოუსმინეთ სწორ ინგლისურ წარმოთქმას და შემდეგ თავად წაიკითხეთ მიკროფონით:</p>
            <div class="practice-list">
        `;
        
        data.speaking.forEach((item, idx) => {
          practiceHtml += `
            <div class="practice-item">
              <div class="item-header">
                <div>
                  <div class="eng-sentence">${item.eng}</div>
                  <div class="geo-sentence">${item.geo}</div>
                </div>
                <div class="controls">
                  <button class="btn-circle" onclick="speak('${item.eng.replace(/'/g, "\\'")}')">🔊</button>
                  <button class="btn-circle btn-mic" onclick="startRecognition(this, '${item.eng.replace(/'/g, "\\'")}')">🎙️</button>
                </div>
              </div>
              <div class="status-alert"></div>
            </div>
          `;
        });
        
        practiceHtml += `</div></div>`;
        contentArea.innerHTML = practiceHtml;
      } 
      else if (activeTab === 'quiz') {
        renderQuiz();
      }
    }

    // Render Quiz view
    function renderQuiz() {
      const data = textbookData[activeChapter];
      const contentArea = document.getElementById('content-area');
      
      if (currentQuizIdx < data.quiz.length) {
        const q = data.quiz[currentQuizIdx];
        
        let optionsHtml = '';
        q.options.forEach(opt => {
          optionsHtml += `<button class="option-btn" onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
        });

        contentArea.innerHTML = `
          <div class="panel active">
            <h2>🧠 ქვიზი - ${data.title}</h2>
            <div class="quiz-question">${q.question}</div>
            <div class="quiz-options">${optionsHtml}</div>
            <button class="btn-next" id="quiz-next-btn" onclick="nextQuestion()">შემდეგი ➡️</button>
          </div>
        `;
      } else {
        contentArea.innerHTML = `
          <div class="panel active" style="text-align: center; padding: 3rem 1rem;">
            <h2>🎉 ტესტი დასრულდა!</h2>
            <div style="font-size: 4rem; font-weight: 800; color: var(--accent); margin: 2rem 0;">
              ${quizScore} / ${data.quiz.length}
            </div>
            <button class="tab-btn active" onclick="restartQuiz()">თავიდან დაწყება 🔄</button>
          </div>
        `;
      }
    }

    // Text to Speech
    function speak(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }
    }

    // Speech Recognition
    function startRecognition(btn, targetText) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("გთხოვთ გამოიყენოთ Google Chrome მიკროფონით სავარჯიშოდ.");
        return;
      }
      
      const item = btn.closest('.practice-item');
      const statusDiv = item.querySelector('.status-alert');
      
      btn.classList.add('recording');
      statusDiv.style.display = 'block';
      statusDiv.className = 'status-alert';
      statusDiv.innerText = "გისმენთ...";

      const recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      
      recognition.onresult = function(event) {
        const spoken = event.results[0][0].transcript.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
        const target = targetText.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
        
        btn.classList.remove('recording');
        
        if (spoken === target) {
          statusDiv.className = 'status-alert status-success';
          statusDiv.innerText = "🎉 სწორია! საუცხოო გამოთქმაა.";
        } else {
          statusDiv.className = 'status-alert status-error';
          statusDiv.innerText = `❌ სცადეთ თავიდან. თქვენ თქვით: "${event.results[0][0].transcript}"`;
        }
      };

      recognition.onerror = function() {
        btn.classList.remove('recording');
        statusDiv.className = 'status-alert status-error';
        statusDiv.innerText = "მიკროფონიდან ხმა არ ჩაიწერა.";
      };

      recognition.start();
    }

    // Check Quiz Answer
    function checkAnswer(btn, opt) {
      const q = textbookData[activeChapter].quiz[currentQuizIdx];
      const panel = btn.closest('.panel');
      
      panel.querySelectorAll('.option-btn').forEach(b => {
        b.disabled = true;
        if (b.innerText === q.correct) b.classList.add('correct');
      });

      if (opt === q.correct) {
        btn.classList.add('correct');
        quizScore++;
      } else {
        btn.classList.add('incorrect');
      }

      document.getElementById('quiz-next-btn').style.display = 'block';
    }

    function nextQuestion() {
      currentQuizIdx++;
      renderQuiz();
    }

    function restartQuiz() {
      currentQuizIdx = 0;
      quizScore = 0;
      renderQuiz();
    }

    // Initialize Page
    selectChapter('prelude');
  </script>
